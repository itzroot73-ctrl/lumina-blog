<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" style="enable-background:new 0 0 40 40;">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="36" height="36" rx="8" ry="8" fill="url(#bgGrad)" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- Outer glow ring -->
  <rect x="3.5" y="3.5" width="33" height="33" rx="6.5" ry="6.5" fill="none" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.15"/>
  <!-- L letter with orange gradient -->
  <path d="M14 10 L14 27.5 Q14 29 15.5 29 L24 29 Q25.5 29 25.5 27.5 L25.5 26 Q25.5 24.5 24 24.5 L19.5 24.5 Q18 24.5 18 23 L18 10 Q18 8.5 16.5 8.5 L15.5 8.5 Q14 8.5 14 10 Z" fill="url(#orangeGrad)" filter="url(#glow)"/>
  <!-- Decorative dot -->
  <circle cx="28" cy="10" r="2.2" fill="#f59e0b" opacity="0.8" filter="url(#glow)"/>
  <!-- Subtle accent line -->
  <line x1="10" y1="32" x2="30" y2="32" stroke="#f97316" stroke-width="0.6" stroke-opacity="0.3" stroke-linecap="round"/>
</svg>
